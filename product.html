<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Товар - Bliz</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            margin: 32px 0;
        }

        .product-gallery {
            background: var(--bg-lighter);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .product-gallery img {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
        }

        .product-details h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .product-meta {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .product-rating-large {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .product-rating-large .stars {
            color: var(--rating-star);
            font-size: 18px;
        }

        .product-price-large {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 16px;
        }

        .product-price-large .current-price {
            font-size: 42px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .product-price-large .old-price {
            font-size: 24px;
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .product-bonus {
            background: var(--primary-green-light);
            color: var(--primary-green);
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 24px;
            display: inline-block;
        }

        .product-description {
            margin-bottom: 24px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .product-actions-large {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .quantity-selector button {
            background: var(--bg-lighter);
            border: none;
            width: 40px;
            height: 48px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .quantity-selector button:hover {
            background: var(--primary-green-light);
        }

        .quantity-selector input {
            width: 60px;
            border: none;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .add-to-cart-large {
            flex: 1;
            background: var(--primary-green);
            color: var(--bg-white);
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-to-cart-large:hover {
            background: var(--primary-green-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(42, 189, 19, 0.25);
        }

        .related-products {
            margin-top: 64px;
        }

        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .product-gallery {
                min-height: 300px;
            }

            .product-details h1 {
                font-size: 24px;
            }

            .product-price-large .current-price {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-content">
                <div class="top-links">
                    <a href="#">Акції</a>
                    <a href="#">Магазини</a>
                    <a href="#">Доставка</a>
                </div>
                <div class="contact-methods">
                    <a href="tel:0800123456">0800 123 456</a>
                </div>
            </div>
        </div>
    </div>

    <header>
        <div class="container">
            <div class="header-main">
                <div class="header-content">
                    <a href="/" class="logo">Bliz</a>
                    <a href="/catalog.html" class="catalog-btn">Каталог</a>
                    <div class="search-bar">
                        <input type="text" placeholder="Пошук товарів...">
                        <button class="search-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="header-actions">
                        <div class="header-action">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="9" cy="21" r="1"></circle>
                                <circle cx="20" cy="21" r="1"></circle>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                            </svg>
                            <span>Кошик</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="product-detail">
            <div class="product-gallery">
                <img id="productImage" src="/assets/images/placeholder.jpg" alt="">
            </div>

            <div class="product-details">
                <h1 id="productName">Завантаження...</h1>

                <div class="product-meta">
                    <div class="product-rating-large">
                        <span class="stars" id="productRating"></span>
                        <span id="productReviews"></span>
                    </div>
                    <span id="productCode"></span>
                </div>

                <div class="product-price-large">
                    <span class="current-price" id="productPrice"></span>
                    <span class="old-price" id="productOldPrice"></span>
                </div>

                <div class="product-bonus" id="productBonus"></div>

                <div class="product-description" id="productDescription"></div>

                <div class="product-actions-large">
                    <div class="quantity-selector">
                        <button onclick="changeQuantity(-1)">−</button>
                        <input type="number" id="quantity" value="1" min="1">
                        <button onclick="changeQuantity(1)">+</button>
                    </div>
                    <button class="add-to-cart-large" onclick="addToCartFromProduct()">
                        Додати до кошика
                    </button>
                </div>
            </div>
        </div>

        <div class="related-products">
            <h2 class="section-title">Схожі товари</h2>
            <div class="products-grid" id="relatedProducts"></div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Bliz. Всі права захищені.</p>
            </div>
        </div>
    </footer>

    <script src="/assets/js/product.js"></script>
</body>
</html>
